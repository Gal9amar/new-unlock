<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>סקר שביעות רצון — UNLOCK מנעולנות</title>
<link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body {
  font-family:'Rubik',sans-serif;
  min-height:100vh;
  background:#0f172a;
  background-image:
    radial-gradient(ellipse at 20% 10%, rgba(29,78,216,0.25) 0%, transparent 55%),
    radial-gradient(ellipse at 80% 90%, rgba(37,99,235,0.15) 0%, transparent 50%);
  display:flex; align-items:center; justify-content:center;
  padding:24px 16px;
}
.card {
  background:#1e293b;
  border:1px solid rgba(255,255,255,0.08);
  border-radius:20px;
  padding:40px 36px;
  max-width:480px;
  width:100%;
  box-shadow:0 24px 60px rgba(0,0,0,0.5);
}
.logo-row { display:flex; align-items:center; gap:12px; margin-bottom:28px; }
.logo-icon {
  width:44px; height:44px;
  background:linear-gradient(135deg,#1d4ed8,#2563eb);
  border-radius:12px;
  display:flex; align-items:center; justify-content:center;
  font-size:22px;
  box-shadow:0 4px 14px rgba(29,78,216,0.4);
}
.logo-text { font-size:19px; font-weight:700; color:#f1f5f9; letter-spacing:-0.5px; }
.logo-sub  { font-size:11px; color:#64748b; }
h1 { font-size:22px; font-weight:700; color:#f1f5f9; margin-bottom:6px; line-height:1.3; }
.subtitle { font-size:14px; color:#94a3b8; margin-bottom:32px; line-height:1.6; }

.q-block { margin-bottom:26px; }
.q-label { font-size:14px; font-weight:600; color:#cbd5e1; margin-bottom:12px; display:block; }

/* STARS */
.stars { display:flex; gap:8px; flex-direction:row-reverse; justify-content:flex-end; }
.stars input { display:none; }
.stars label { font-size:38px; cursor:pointer; color:#334155; transition:color .15s,transform .1s; line-height:1; }
.stars label:hover,
.stars label:hover ~ label,
.stars input:checked ~ label { color:#facc15; }
.stars label:hover { transform:scale(1.15); }

/* CHOICES */
.choices { display:flex; gap:8px; flex-wrap:wrap; }
.choice-btn {
  flex:1; min-width:80px;
  padding:11px 12px;
  border:1.5px solid #334155;
  border-radius:10px;
  background:#0f172a;
  font-family:'Rubik',sans-serif;
  font-size:13px; font-weight:500;
  color:#94a3b8;
  cursor:pointer;
  transition:all .18s;
  text-align:center;
}
.choice-btn:hover { border-color:#2563eb; color:#e2e8f0; background:#1e293b; }
.choice-btn.sel-green { border-color:#10b981; background:rgba(16,185,129,0.15); color:#10b981; }
.choice-btn.sel-red   { border-color:#ef4444; background:rgba(239,68,68,0.12);  color:#ef4444; }
.choice-btn.sel-amber { border-color:#f59e0b; background:rgba(245,158,11,0.12); color:#f59e0b; }
.choice-btn.sel-blue  { border-color:#2563eb; background:rgba(37,99,235,0.15);  color:#60a5fa; }

/* TEXTAREA */
textarea {
  width:100%;
  border:1.5px solid #334155;
  border-radius:10px;
  padding:12px 14px;
  font-family:'Rubik',sans-serif;
  font-size:14px; color:#e2e8f0;
  resize:vertical; min-height:88px;
  outline:none;
  transition:border-color .18s;
  background:#0f172a;
}
textarea:focus { border-color:#2563eb; }
textarea::placeholder { color:#475569; }

.divider { height:1px; background:rgba(255,255,255,0.06); margin:4px 0 26px; }

.submit-btn {
  width:100%; padding:15px;
  background:linear-gradient(135deg,#1d4ed8,#2563eb);
  color:#fff; border:none; border-radius:12px;
  font-family:'Rubik',sans-serif;
  font-size:16px; font-weight:600;
  cursor:pointer;
  transition:opacity .18s, transform .1s;
  margin-top:8px;
  box-shadow:0 4px 20px rgba(29,78,216,0.4);
}
.submit-btn:hover { opacity:.9; }
.submit-btn:active { transform:scale(0.99); }
.submit-btn:disabled { background:#334155; box-shadow:none; cursor:not-allowed; }

#thankyou { display:none; text-align:center; padding:20px 0; }
.ty-icon  { font-size:56px; margin-bottom:16px; }
.ty-title { font-size:24px; font-weight:700; color:#f1f5f9; margin-bottom:8px; }
.ty-sub   { font-size:15px; color:#94a3b8; line-height:1.7; }
.ty-badge {
  display:inline-block; margin-top:20px;
  background:rgba(250,204,21,0.12); border:1px solid rgba(250,204,21,0.3);
  border-radius:20px; padding:6px 16px;
  font-size:13px; color:#facc15;
}

.error-msg { color:#f87171; font-size:13px; margin-top:10px; display:none; }

@media(max-width:480px) {
  .card { padding:28px 18px; border-radius:16px; }
  h1 { font-size:20px; }
  .stars label { font-size:34px; }
}
</style>
</head>
<body>
<div class="card">
  <div class="logo-row">
    <div class="logo-icon">🔐</div>
    <div>
      <div class="logo-text">UNLOCK</div>
      <div class="logo-sub">מנעולנות מקצועית</div>
    </div>
  </div>

  <div id="form-section">
    <h1>איך היה השירות?</h1>
    <p class="subtitle">30 שניות מזמנך יעזרו לנו להשתפר<br>ולהעניק שירות עוד יותר טוב</p>

    <div class="q-block">
      <label class="q-label">דירוג כללי</label>
      <div class="stars">
        <input type="radio" name="stars" id="s5" value="5"><label for="s5">★</label>
        <input type="radio" name="stars" id="s4" value="4"><label for="s4">★</label>
        <input type="radio" name="stars" id="s3" value="3"><label for="s3">★</label>
        <input type="radio" name="stars" id="s2" value="2"><label for="s2">★</label>
        <input type="radio" name="stars" id="s1" value="1"><label for="s1">★</label>
      </div>
    </div>

    <div class="divider"></div>

    <div class="q-block">
      <label class="q-label">זמן הגעת הטכנאי</label>
      <div class="choices" id="g-arrival">
        <button class="choice-btn" data-val="מהיר"  data-color="green" onclick="pick('arrival',this)">⚡ מהיר</button>
        <button class="choice-btn" data-val="סביר"  data-color="amber" onclick="pick('arrival',this)">👍 סביר</button>
        <button class="choice-btn" data-val="איחר"  data-color="red"   onclick="pick('arrival',this)">⏳ איחר</button>
      </div>
    </div>

    <div class="divider"></div>

    <div class="q-block">
      <label class="q-label">תחושתך לגבי המחיר</label>
      <div class="choices" id="g-price">
        <button class="choice-btn" data-val="שווה את המחיר" data-color="green" onclick="pick('price',this)">✅ שווה</button>
        <button class="choice-btn" data-val="יקר"           data-color="red"   onclick="pick('price',this)">💸 יקר</button>
        <button class="choice-btn" data-val="זול"           data-color="blue"  onclick="pick('price',this)">🤑 זול</button>
      </div>
    </div>

    <div class="divider"></div>

    <div class="q-block">
      <label class="q-label">האם תמליץ עלינו לחבר?</label>
      <div class="choices" id="g-recommend">
        <button class="choice-btn" data-val="כן" data-color="green" onclick="pick('recommend',this)">❤️ בהחלט כן</button>
        <button class="choice-btn" data-val="לא" data-color="red"   onclick="pick('recommend',this)">👎 לא</button>
      </div>
    </div>

    <div class="divider"></div>

    <div class="q-block">
      <label class="q-label">הערות נוספות <span style="color:#475569;font-weight:400;font-size:12px">(אופציונלי)</span></label>
      <textarea id="comment" placeholder="ספר לנו עוד..."></textarea>
    </div>

    <p class="error-msg" id="error-msg">אנא ענה על כל השאלות לפני שליחה</p>
    <button class="submit-btn" id="submit-btn" onclick="submitSurvey()">שלח משוב ←</button>
  </div>

  <div id="thankyou">
    <div class="ty-icon">🙏</div>
    <div class="ty-title">תודה רבה!</div>
    <p class="ty-sub">המשוב שלך חשוב לנו מאוד<br>ועוזר לנו לשפר את השירות</p>
    <div class="ty-badge">⭐ UNLOCK — מנעולנות מקצועית</div>
  </div>
</div>

<script>
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbwJAYb3ehXaSl9Ir8KJilJy4PAbIixkRWR6aCTN1CJEsqVl4mT7iwG6YKZp6f_MqRelOQ/exec';
const answers = { stars:null, arrival:null, price:null, recommend:null };

document.querySelectorAll('.stars input').forEach(inp =>
  inp.addEventListener('change', () => answers.stars = inp.value)
);

function pick(group, btn) {
  document.querySelectorAll(`#g-${group} .choice-btn`).forEach(b =>
    b.classList.remove('selected','sel-green','sel-red','sel-amber','sel-blue')
  );
  btn.classList.add('selected','sel-' + btn.dataset.color);
  answers[group] = btn.dataset.val;
}

async function submitSurvey() {
  if (!answers.stars || !answers.arrival || !answers.price || !answers.recommend) {
    document.getElementById('error-msg').style.display = 'block';
    return;
  }
  document.getElementById('error-msg').style.display = 'none';
  const btn = document.getElementById('submit-btn');
  btn.disabled = true; btn.textContent = 'שולח...';

  try {
    await fetch(SHEET_URL, {
      method:'POST', mode:'no-cors',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        stars: answers.stars, arrival: answers.arrival,
        price: answers.price, recommend: answers.recommend,
        comment: document.getElementById('comment').value.trim()
      })
    });
  } catch(e) { console.error(e); }

  document.getElementById('form-section').style.display = 'none';
  document.getElementById('thankyou').style.display = 'block';
}
</script>
</body>
</html>
