<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <meta name="robots" content="noindex,nofollow"/>
  <title>תודה רבה — UNLOCK מנעולנות</title>
  <link rel="icon" href="images/fav.png"/>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      font-family: 'Heebo', Arial, sans-serif;
      background: #f8fafc;
      color: #0f172a;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      overflow: hidden;
    }

    /* NAV */
    nav {
      flex-shrink: 0;
      background: rgba(255,255,255,0.95);
      border-bottom: 1px solid #e2e8f0;
      padding: 0.75rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-logo { display:flex;align-items:center;gap:0.6rem;font-weight:800;font-size:1.1rem;color:#1d4ed8;text-decoration:none; }
    .nav-logo img { width:32px;height:32px; }
    .nav-phone { font-size:0.9rem;font-weight:600;color:#1d4ed8;text-decoration:none; }

    /* CENTER */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .card {
      background: #fff;
      border-radius: 24px;
      border: 1px solid #e2e8f0;
      padding: 2.5rem 2rem;
      max-width: 440px;
      width: 100%;
      text-align: center;
      box-shadow: 0 8px 40px rgba(15,23,42,0.10);
      animation: fadeUp 0.45s ease both;
    }
    @keyframes fadeUp { from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)} }

    .logo-wrap {
      width: 80px; height: 80px;
      margin: 0 auto 1.5rem;
    }
    .logo-wrap img { width: 100%; height: 100%; object-fit: contain; }

    h1 {
      font-size: 1.6rem;
      font-weight: 800;
      color: #0f172a;
      margin-bottom: 0.75rem;
    }

    .msg {
      font-size: 0.97rem;
      color: #64748b;
      line-height: 1.7;
      margin-bottom: 1.5rem;
    }

    .divider { height:1px;background:#e2e8f0;margin:0 0 1.5rem; }

    .signature {
      font-size: 0.88rem;
      color: #94a3b8;
      line-height: 1.8;
      margin-bottom: 1.75rem;
    }
    .signature strong { color: #0f172a; font-weight: 700; }

    .back-btn {
      display: inline-block;
      padding: 0.8rem 2rem;
      background: linear-gradient(135deg,#1d4ed8,#2563eb);
      color: #fff;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 700;
      text-decoration: none;
      box-shadow: 0 6px 20px rgba(37,99,235,0.35);
      transition: transform 0.2s;
    }
    .back-btn:hover { transform: translateY(-2px); }

    .contact-row {
      margin-top: 1.25rem;
      font-size: 0.82rem;
      color: #94a3b8;
    }
    .contact-row a { color: #1d4ed8; text-decoration: none; font-weight: 600; }
  </style>
</head>
<body>

  <nav>
    <a href="/" class="nav-logo"><img src="images/fav.png" alt="UNLOCK"/>UNLOCK</a>
    <a href="tel:0533888381" class="nav-phone">📞 053-388-8381</a>
  </nav>

  <main>
    <div class="card">
      <div class="logo-wrap">
        <img src="images/fav.png" alt="UNLOCK"/>
      </div>

      <h1 id="thank-title">תודה רבה!</h1>

      <p class="msg">
        קיבלנו את הפרטים. המסמך יונפק וישלח אליך בהקדם האפשרי —
        תודה שבחרת בשירות שלנו.
      </p>

      <div class="divider"></div>

      <div class="signature">
        בברכה,<br/>
        <strong>גבי המנעולן</strong> 🔐
      </div>

      <a href="/" class="back-btn">← חזרה לאתר הבית</a>

      <div class="contact-row">
        שאלות? <a href="tel:0533888381">053-388-8381</a>
        &nbsp;·&nbsp;
        <a href="https://wa.me/972533888381">WhatsApp</a>
      </div>
    </div>
  </main>

  <script>
    const name = new URLSearchParams(window.location.search).get('name');
    if (name) {
      const first = decodeURIComponent(name).trim().split(' ')[0];
      document.getElementById('thank-title').textContent = 'תודה רבה ' + first + '!';
    }
  </script>
</body>
</html>
