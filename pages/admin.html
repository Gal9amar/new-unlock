<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>UNLOCK – לוח ניהול</title>
  <link rel="icon" href="../images/fav.png"/>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../styles/admin.css"/>
  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js';
    import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js';

    const app = initializeApp({
      apiKey: "AIzaSyDxu3_YpzlDVzAzY4-0V-2mJr1mJUooLLs",
      authDomain: "hamanulan-3bbc7.firebaseapp.com",
      projectId: "hamanulan-3bbc7",
      appId: "1:913877518377:web:44611c5c89a32d56c1b438"
    });

    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    onAuthStateChanged(auth, (user) => {
      if (user) {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('adminScreen').classList.add('visible');
        window._firebaseUser = user;
        initAdmin();
      } else {
        document.getElementById('loginScreen').style.display = 'flex';
        document.getElementById('adminScreen').classList.remove('visible');
        window._firebaseUser = null;
      }
    });

    window.doLogin = async function() {
      try {
        await signInWithPopup(auth, provider);
      } catch(e) {
        document.getElementById('loginError').textContent = 'שגיאה בהתחברות עם Google';
      }
    };

    window.doLogout = async function() {
      await signOut(auth);
    };

    window.getIdToken = async function() {
      const user = auth.currentUser;
      if (!user) return null;
      return await user.getIdToken();
    };
  </script>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <img src="../images/fav.png" alt="UNLOCK" class="login-logo"/>
    <h1>UNLOCK Admin</h1>
    <p>לוח ניהול</p>
    <button class="login-btn google-btn" onclick="doLogin()">
      <svg width="18" height="18" viewBox="0 0 48 48" style="margin-left:8px"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      התחבר עם Google
    </button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- ADMIN -->
<div class="admin-screen" id="adminScreen">

  <!-- Topbar -->
  <div class="topbar">
    <div class="topbar-start">
      <button class="hamburger" id="hamburgerBtn" onclick="toggleSidebar()" aria-label="תפריט">
        <span></span><span></span><span></span>
      </button>
      <div class="topbar-logo">
        <img src="../images/fav.png" alt="UNLOCK"/>
        UNLOCK Admin
      </div>
    </div>
    <div class="topbar-actions">
      <a href="/" class="btn btn-outline" target="_blank">← האתר</a>
      <button class="btn btn-outline" onclick="doLogout()">יציאה</button>
    </div>
  </div>

  <!-- Layout: sidebar + content -->
  <div class="admin-layout">

    <!-- Sidebar overlay (mobile) -->
    <div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <nav class="sidebar-nav">
        <button class="sidebar-item active" id="nav-products" onclick="switchSection('products')">
          <span class="sidebar-icon">📦</span>
          <span class="sidebar-label">מוצרים</span>
        </button>
        <button class="sidebar-item" id="nav-surveys" onclick="switchSection('surveys')">
          <span class="sidebar-icon">⭐</span>
          <span class="sidebar-label">סקרי לקוח</span>
        </button>
        <button class="sidebar-item" id="nav-invoices" onclick="switchSection('invoices')">
          <span class="sidebar-icon">📄</span>
          <span class="sidebar-label">חשבוניות</span>
        </button>
      </nav>
    </aside>

    <!-- Main content -->
    <main class="admin-main">

      <!-- Products section -->
      <div class="admin-section" id="section-products">
        <div class="section-header">
          <h2>מוצרים <span class="count-badge" id="productsCount">0</span></h2>
          <button class="btn btn-gold" onclick="openAddModal()">+ מוצר חדש</button>
        </div>
        <div class="products-grid" id="productsGrid">
          <p class="empty-state">טוען מוצרים...</p>
        </div>
      </div>

      <!-- Surveys section -->
      <div class="admin-section hidden" id="section-surveys">
        <div class="section-header">
          <h2>סקרי לקוח <span class="count-badge" id="surveysCount">0</span></h2>
          <button class="btn btn-outline" onclick="loadSurveys()">🔄 רענן</button>
        </div>
        <div id="surveysContainer">
          <p class="empty-state">לחץ רענן לטעינה</p>
        </div>
      </div>

      <!-- Invoices section -->
      <div class="admin-section hidden" id="section-invoices">
        <div class="section-header">
          <h2>בקשות חשבונית <span class="count-badge" id="invoicesCount">0</span></h2>
          <button class="btn btn-outline" onclick="loadInvoices()">🔄 רענן</button>
        </div>
        <div id="invoicesContainer">
          <p class="empty-state">לחץ רענן לטעינה</p>
        </div>
      </div>

    </main>
  </div>
</div>

<!-- EDIT/ADD MODAL -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">עריכת מוצר</h3>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>

    <div class="field">
      <label>שם מוצר</label>
      <input type="text" id="fTitle" placeholder='MTL™800 מולטילוק'/>
    </div>
    <div class="field">
      <label>תיאור</label>
      <textarea id="fDesc" placeholder="תיאור המוצר..."></textarea>
    </div>
    <div class="field-row">
      <div class="field">
        <label>מחיר מלא (₪)</label>
        <input type="number" id="fPrice" placeholder="770"/>
      </div>
      <div class="field">
        <label>מחיר מבצע (₪) – אופציונלי</label>
        <input type="number" id="fDiscountPrice" placeholder="550"/>
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>מותג</label>
        <input type="text" id="fBrand" placeholder="מולטילוק"/>
      </div>
      <div class="field">
        <label>קטגוריה</label>
        <select id="fCategory">
          <option>צילינדרים</option>
          <option>מנעולים חכמים</option>
          <option>מנעולים עליונים</option>
          <option>מנעולים מכאניים</option>
          <option>דלתות</option>
          <option>מנעול ויטרינה</option>
          <option>שונות</option>
        </select>
      </div>
    </div>
    <div class="field-row">
      <div class="field">
        <label>סטטוס</label>
        <select id="fStatus">
          <option value="">ללא</option>
          <option value="חדש">חדש</option>
          <option value="חם">חם</option>
          <option value="מבצע">מבצע</option>
        </select>
      </div>
      <div class="field">
        <label>מע"מ</label>
        <div class="vat-toggle">
          <button type="button" class="vat-opt" id="vatN" onclick="setVat('n')">לא כולל</button>
          <button type="button" class="vat-opt" id="vatY" onclick="setVat('y')">כולל</button>
        </div>
      </div>
    </div>
    <div class="field">
      <label>הערה (note)</label>
      <input type="text" id="fNote" placeholder="כולל שירות והתקנה"/>
    </div>
    <div class="field">
      <label>תמונה (נתיב)</label>
      <input type="text" id="fImage" placeholder="images/product.jpg"/>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">ביטול</button>
      <button class="btn btn-gold" id="saveBtn" onclick="saveProduct()">💾 שמור</button>
    </div>
  </div>
</div>

<!-- CONFIRM DELETE -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <h4>אישור מחיקה</h4>
    <p id="confirmText"></p>
    <div class="confirm-btns">
      <button class="btn btn-outline" onclick="closeConfirm()">ביטול</button>
      <button class="btn btn-danger" id="confirmDeleteBtn">מחק</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
  const ADMIN_PRODUCTS = 'https://us-central1-hamanulan-3bbc7.cloudfunctions.net/adminProducts';
  const ADMIN_SURVEYS  = 'https://us-central1-hamanulan-3bbc7.cloudfunctions.net/adminSurveys';
  const ADMIN_INVOICES = 'https://us-central1-hamanulan-3bbc7.cloudfunctions.net/adminInvoices';

  let products = [];
  let editIndex = -1;
  let currentVat = 'n';
  let currentSection = 'products';

  // ── Init ──
  async function initAdmin() {
    await loadProducts();
  }

  // ── Auth header ──
  async function authHeader() {
    const token = await getIdToken();
    return { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' };
  }

  // ── Sidebar ──
  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
    document.getElementById('sidebarOverlay').classList.toggle('visible');
  }

  function closeSidebar() {
    document.getElementById('sidebar').classList.remove('open');
    document.getElementById('sidebarOverlay').classList.remove('visible');
  }

  function switchSection(section) {
    currentSection = section;
    document.querySelectorAll('.admin-section').forEach(el => el.classList.add('hidden'));
    document.getElementById('section-' + section).classList.remove('hidden');
    document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
    document.getElementById('nav-' + section).classList.add('active');
    closeSidebar();
    if (section === 'surveys') loadSurveys();
    if (section === 'invoices') loadInvoices();
  }

  // ── Products ──
  async function loadProducts() {
    try {
      const res = await fetch(ADMIN_PRODUCTS, { headers: await authHeader() });
      products = await res.json();
      renderProducts();
    } catch(e) {
      showToast('שגיאה בטעינת מוצרים', 'error');
    }
  }

  function renderProducts() {
    const grid = document.getElementById('productsGrid');
    document.getElementById('productsCount').textContent = products.length;
    grid.innerHTML = products.map((p, i) => `
      <div class="product-row" data-id="${p.id}" data-index="${i}">
        <span class="drag-handle">⠿</span>
        <img class="product-thumb" src="${p.image ? '../' + p.image : '../images/fav.png'}" onerror="this.src='../images/fav.png'" alt="${p.title}"/>
        <div class="product-info">
          <div class="product-name">${p.title}</div>
          <div class="product-meta">${p.brand} · ${p.category} · ${p.including_vat === 'n' ? 'לא כולל מע"מ' : 'כולל מע"מ'}</div>
          <div class="product-price-display">
            ₪${p.discount_price || p.price || '—'}
            ${p.discount_price ? `<span class="old">₪${p.price}</span>` : ''}
          </div>
        </div>
        <div class="product-actions-row">
          <button class="btn btn-outline" onclick="openEditModal(${i})">✏️ עריכה</button>
          <button class="btn btn-danger" onclick="openConfirmDelete(${i})">🗑️</button>
        </div>
      </div>
    `).join('');

    Sortable.create(grid, {
      handle: '.drag-handle',
      animation: 150,
      onEnd: async (evt) => {
        const { oldIndex, newIndex } = evt;
        if (oldIndex === newIndex) return;
        const moved = products.splice(oldIndex, 1)[0];
        products.splice(newIndex, 0, moved);
        const headers = await authHeader();
        await Promise.all(products.map((p, i) =>
          fetch(`${ADMIN_PRODUCTS}?id=${p.id}`, {
            method: 'PUT', headers,
            body: JSON.stringify({ order: i })
          })
        ));
        showToast('הסדר עודכן ✓', 'success');
        renderProducts();
      }
    });
  }

  function openEditModal(index) {
    editIndex = index;
    const p = products[index];
    document.getElementById('modalTitle').textContent = 'עריכת מוצר';
    document.getElementById('fTitle').value = p.title || '';
    document.getElementById('fDesc').value = p.desc || '';
    document.getElementById('fPrice').value = p.price || '';
    document.getElementById('fDiscountPrice').value = p.discount_price || '';
    document.getElementById('fBrand').value = p.brand || '';
    document.getElementById('fCategory').value = p.category || 'צילינדרים';
    document.getElementById('fStatus').value = p.status || '';
    document.getElementById('fNote').value = p.note || '';
    document.getElementById('fImage').value = p.image || '';
    setVat(p.including_vat || 'n');
    document.getElementById('editModal').classList.add('visible');
  }

  function openAddModal() {
    editIndex = -1;
    document.getElementById('modalTitle').textContent = 'הוספת מוצר חדש';
    ['fTitle','fDesc','fPrice','fDiscountPrice','fBrand','fImage'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('fCategory').value = 'צילינדרים';
    document.getElementById('fStatus').value = '';
    document.getElementById('fNote').value = 'כולל שירות והתקנה';
    setVat('n');
    document.getElementById('editModal').classList.add('visible');
  }

  function closeModal() {
    document.getElementById('editModal').classList.remove('visible');
  }

  function setVat(val) {
    currentVat = val;
    document.getElementById('vatN').classList.toggle('active', val === 'n');
    document.getElementById('vatY').classList.toggle('active', val === 'y');
  }

  async function saveProduct() {
    const btn = document.getElementById('saveBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-inline"></span> שומר...';
    const data = {
      title: document.getElementById('fTitle').value.trim(),
      desc: document.getElementById('fDesc').value.trim(),
      image: document.getElementById('fImage').value.trim(),
      price: parseFloat(document.getElementById('fPrice').value) || 0,
      discount_price: parseFloat(document.getElementById('fDiscountPrice').value) || '',
      brand: document.getElementById('fBrand').value.trim(),
      category: document.getElementById('fCategory').value,
      status: document.getElementById('fStatus').value,
      tags: editIndex >= 0 ? (products[editIndex].tags || []) : [],
      phone: '0533888381',
      whatsapp: '972533888381',
      note: document.getElementById('fNote').value.trim(),
      including_vat: currentVat
    };
    if (!data.discount_price) delete data.discount_price;
    try {
      const headers = await authHeader();
      if (editIndex >= 0) {
        await fetch(`${ADMIN_PRODUCTS}?id=${products[editIndex].id}`, { method: 'PUT', headers, body: JSON.stringify(data) });
        showToast('המוצר עודכן ✓', 'success');
      } else {
        await fetch(ADMIN_PRODUCTS, { method: 'POST', headers, body: JSON.stringify(data) });
        showToast('המוצר נוסף ✓', 'success');
      }
      closeModal();
      await loadProducts();
    } catch(e) {
      showToast('שגיאה בשמירה', 'error');
    }
    btn.disabled = false;
    btn.innerHTML = '💾 שמור';
  }

  // ── Delete (products) ──
  let deleteIndex = -1;
  let deleteMode = 'product';
  let deleteId = null;

  function openConfirmDelete(index) {
    deleteMode = 'product';
    deleteIndex = index;
    document.getElementById('confirmText').textContent = `למחוק את "${products[index].title}"?`;
    document.getElementById('confirmOverlay').classList.add('visible');
    document.getElementById('confirmDeleteBtn').onclick = confirmDelete;
  }

  function closeConfirm() {
    document.getElementById('confirmOverlay').classList.remove('visible');
  }

  async function confirmDelete() {
    closeConfirm();
    try {
      const headers = await authHeader();
      if (deleteMode === 'product') {
        await fetch(`${ADMIN_PRODUCTS}?id=${products[deleteIndex].id}`, { method: 'DELETE', headers });
        showToast('המוצר נמחק', 'success');
        await loadProducts();
      } else if (deleteMode === 'survey') {
        await fetch(`${ADMIN_SURVEYS}?id=${deleteId}`, { method: 'DELETE', headers });
        showToast('הסקר נמחק', 'success');
        await loadSurveys();
      } else if (deleteMode === 'invoice') {
        await fetch(`${ADMIN_INVOICES}?id=${deleteId}`, { method: 'DELETE', headers });
        showToast('הרשומה נמחקה', 'success');
        await loadInvoices();
      }
    } catch(e) {
      showToast('שגיאה במחיקה', 'error');
    }
  }

  // ── Surveys ──
  async function loadSurveys() {
    document.getElementById('surveysContainer').innerHTML = '<p class="empty-state">טוען...</p>';
    try {
      const res = await fetch(ADMIN_SURVEYS, { headers: await authHeader() });
      const surveys = await res.json();
      document.getElementById('surveysCount').textContent = surveys.length;
      if (!surveys.length) {
        document.getElementById('surveysContainer').innerHTML = '<p class="empty-state">אין סקרים עדיין</p>';
        return;
      }
      document.getElementById('surveysContainer').innerHTML = `
        <div class="data-table-wrap">
          <table class="data-table">
            <thead>
              <tr>
                <th>תאריך</th>
                <th>שם</th>
                <th>טלפון</th>
                <th>כוכבים</th>
                <th>איכות</th>
                <th>הגעה</th>
                <th>מחיר</th>
                <th>יחס</th>
                <th>המלצה</th>
                <th>הערה</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              ${surveys.map(s => `
                <tr>
                  <td class="td-date">${s.createdAt ? s.createdAt.slice(0,10) : '—'}</td>
                  <td>${s.customer_name || '—'}</td>
                  <td dir="ltr">${s.phone || '—'}</td>
                  <td class="td-stars">${'★'.repeat(Number(s.stars)||0)}</td>
                  <td>${s.quality || '—'}</td>
                  <td>${s.arrival || '—'}</td>
                  <td>${s.price || '—'}</td>
                  <td>${s.attitude || '—'}</td>
                  <td>${s.recommend || '—'}</td>
                  <td class="td-comment">${s.comment || ''}</td>
                  <td><button class="btn btn-danger btn-sm" onclick="deleteRecord('survey','${s.id}', '${(s.customer_name||'').replace(/'/g,"\\'")}')">🗑️</button></td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;
    } catch(e) {
      document.getElementById('surveysContainer').innerHTML = '<p class="empty-state error">שגיאה בטעינה</p>';
    }
  }

  // ── Invoices ──
  async function loadInvoices() {
    document.getElementById('invoicesContainer').innerHTML = '<p class="empty-state">טוען...</p>';
    try {
      const res = await fetch(ADMIN_INVOICES, { headers: await authHeader() });
      const invoices = await res.json();
      document.getElementById('invoicesCount').textContent = invoices.length;
      if (!invoices.length) {
        document.getElementById('invoicesContainer').innerHTML = '<p class="empty-state">אין בקשות עדיין</p>';
        return;
      }
      document.getElementById('invoicesContainer').innerHTML = `
        <div class="data-table-wrap">
          <table class="data-table">
            <thead>
              <tr>
                <th>תאריך</th>
                <th>שם</th>
                <th>טלפון</th>
                <th>מייל</th>
                <th>ח.פ/ת.ז</th>
                <th>כתובת</th>
                <th>שירות</th>
                <th>סכום</th>
                <th>מע"מ</th>
                <th>תשלום</th>
                <th>מידרג</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              ${invoices.map(inv => `
                <tr>
                  <td class="td-date">${inv.createdAt ? inv.createdAt.slice(0,10) : '—'}</td>
                  <td>${inv.name || '—'}</td>
                  <td dir="ltr">${inv.phone || '—'}</td>
                  <td>${inv.email || '—'}</td>
                  <td>${inv.id_number || '—'}</td>
                  <td>${inv.service_address || '—'}</td>
                  <td class="td-comment">${inv.message || '—'}</td>
                  <td>₪${inv.amount || '—'}</td>
                  <td>${inv.vat_type || '—'}</td>
                  <td>${inv.payment_method || '—'}</td>
                  <td>${inv.midrag_name || '—'}</td>
                  <td><button class="btn btn-danger btn-sm" onclick="deleteRecord('invoice','${inv.id}', '${(inv.name||'').replace(/'/g,"\\'")}')">🗑️</button></td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      `;
    } catch(e) {
      document.getElementById('invoicesContainer').innerHTML = '<p class="empty-state error">שגיאה בטעינה</p>';
    }
  }

  function deleteRecord(mode, id, name) {
    deleteMode = mode;
    deleteId = id;
    document.getElementById('confirmText').textContent = `למחוק את "${name}"?`;
    document.getElementById('confirmOverlay').classList.add('visible');
    document.getElementById('confirmDeleteBtn').onclick = confirmDelete;
  }

  // ── Toast ──
  let toastTimer;
  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type} show`;
    clearTimeout(toastTimer);
    if (type !== 'loading') {
      toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
    }
  }

  document.getElementById('editModal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });
  document.getElementById('confirmOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeConfirm();
  });
</script>
</body>
</html>
