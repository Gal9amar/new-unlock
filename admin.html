<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>UNLOCK – לוח ניהול</title>
  <link rel="icon" href="images/fav.png"/>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1623;
      --surface: #161e2e;
      --surface2: #1e2a3d;
      --border: #2a3a52;
      --gold: #d4a853;
      --gold-light: #e8c47a;
      --blue: #2563eb;
      --text: #e2e8f0;
      --muted: #64748b;
      --danger: #ef4444;
      --success: #22c55e;
      --radius: 12px;
    }

    body {
      font-family: 'Heebo', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Login ── */
    .login-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      background: radial-gradient(ellipse at 50% 0%, #1e2a3d 0%, #0f1623 70%);
    }

    .login-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 380px;
      text-align: center;
      box-shadow: 0 24px 48px rgba(0,0,0,0.4);
      animation: fadeUp 0.4s ease both;
    }

    .login-logo {
      width: 64px;
      height: 64px;
      margin: 0 auto 1.25rem;
    }

    .login-card h1 {
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--gold);
      margin-bottom: 0.25rem;
    }

    .login-card p {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 1.75rem;
    }

    .login-input {
      width: 100%;
      padding: 0.75rem 1rem;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: 'Heebo', sans-serif;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
      text-align: center;
      letter-spacing: 0.1em;
      margin-bottom: 1rem;
    }

    .login-input:focus { border-color: var(--gold); }

    .login-btn {
      width: 100%;
      padding: 0.8rem;
      background: linear-gradient(135deg, #b8882a, var(--gold));
      color: #0f1623;
      font-family: 'Heebo', sans-serif;
      font-size: 1rem;
      font-weight: 800;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: opacity 0.2s, transform 0.15s;
    }

    .login-btn:hover { opacity: 0.9; transform: translateY(-1px); }
    .login-error { color: var(--danger); font-size: 0.85rem; margin-top: 0.75rem; }

    /* ── Admin layout ── */
    .admin-screen { display: none; }
    .admin-screen.visible { display: block; }

    .topbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0.85rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .topbar-logo {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      font-weight: 800;
      font-size: 1rem;
      color: var(--gold);
    }

    .topbar-logo img { width: 28px; }

    .topbar-actions { display: flex; gap: 0.75rem; align-items: center; }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.5rem 1rem;
      border-radius: 8px;
      font-family: 'Heebo', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.18s;
    }

    .btn-gold {
      background: linear-gradient(135deg, #b8882a, var(--gold));
      color: #0f1623;
    }
    .btn-gold:hover { opacity: 0.85; transform: translateY(-1px); }

    .btn-outline {
      background: transparent;
      border: 1.5px solid var(--border);
      color: var(--muted);
    }
    .btn-outline:hover { border-color: var(--gold); color: var(--gold); }

    .btn-danger {
      background: rgba(239,68,68,0.15);
      color: var(--danger);
      border: 1.5px solid rgba(239,68,68,0.3);
    }
    .btn-danger:hover { background: rgba(239,68,68,0.25); }

    .btn-success {
      background: rgba(34,197,94,0.15);
      color: var(--success);
      border: 1.5px solid rgba(34,197,94,0.3);
    }
    .btn-success:hover { background: rgba(34,197,94,0.25); }

    /* ── Main ── */
    .admin-main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 1.5rem 1rem 4rem;
    }

    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.25rem;
    }

    .section-header h2 {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
    }

    .products-count {
      font-size: 0.8rem;
      color: var(--muted);
      background: var(--surface2);
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
    }

    /* ── Product table ── */
    .products-grid {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }

    .product-row {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      display: grid;
      grid-template-columns: 48px 1fr auto;
      align-items: center;
      gap: 1rem;
      transition: border-color 0.2s;
    }

    .product-row:hover { border-color: var(--gold); }

    .product-thumb {
      width: 48px;
      height: 48px;
      object-fit: cover;
      border-radius: 8px;
      background: var(--surface2);
    }

    .product-info { min-width: 0; }

    .product-name {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .product-meta {
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 2px;
    }

    .product-price-display {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--gold);
    }

    .product-price-display .old {
      color: var(--muted);
      text-decoration: line-through;
      font-weight: 400;
      font-size: 0.78rem;
      margin-right: 4px;
    }

    .product-actions-row {
      display: flex;
      gap: 0.5rem;
    }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(4px);
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .modal-overlay.visible {
      opacity: 1;
      pointer-events: all;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      width: 100%;
      max-width: 560px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 2rem;
      transform: translateY(20px);
      transition: transform 0.25s;
      box-shadow: 0 32px 64px rgba(0,0,0,0.5);
    }

    .modal-overlay.visible .modal { transform: translateY(0); }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
    }

    .modal-header h3 {
      font-size: 1.1rem;
      font-weight: 800;
      color: var(--gold);
    }

    .modal-close {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.4rem;
      cursor: pointer;
      line-height: 1;
      transition: color 0.2s;
    }
    .modal-close:hover { color: var(--text); }

    /* ── Form fields ── */
    .field {
      margin-bottom: 1rem;
    }

    .field label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 0.35rem;
      letter-spacing: 0.04em;
    }

    .field input,
    .field textarea,
    .field select {
      width: 100%;
      padding: 0.65rem 0.9rem;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Heebo', sans-serif;
      font-size: 0.92rem;
      outline: none;
      transition: border-color 0.2s;
      direction: rtl;
    }

    .field input:focus,
    .field textarea:focus,
    .field select:focus { border-color: var(--gold); }

    .field textarea { resize: vertical; min-height: 80px; line-height: 1.6; }

    .field select option { background: var(--surface); }

    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }

    .vat-toggle {
      display: flex;
      gap: 0.5rem;
    }

    .vat-opt {
      flex: 1;
      padding: 0.55rem;
      border-radius: 8px;
      border: 1.5px solid var(--border);
      background: var(--bg);
      color: var(--muted);
      font-family: 'Heebo', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      text-align: center;
      transition: all 0.18s;
    }

    .vat-opt.active {
      background: linear-gradient(135deg, #b8882a, var(--gold));
      border-color: var(--gold);
      color: #0f1623;
    }

    .modal-footer {
      display: flex;
      gap: 0.75rem;
      margin-top: 1.5rem;
      justify-content: flex-end;
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.75rem 1.5rem;
      font-size: 0.9rem;
      font-weight: 600;
      z-index: 999;
      transition: transform 0.3s ease;
      white-space: nowrap;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }

    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.success { color: var(--success); border-color: rgba(34,197,94,0.3); }
    .toast.error { color: var(--danger); border-color: rgba(239,68,68,0.3); }
    .toast.loading { color: var(--gold); border-color: rgba(212,168,83,0.3); }

    /* ── Confirm dialog ── */
    .confirm-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .confirm-overlay.visible { opacity: 1; pointer-events: all; }

    .confirm-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.75rem;
      max-width: 340px;
      width: 100%;
      text-align: center;
      box-shadow: 0 24px 48px rgba(0,0,0,0.5);
    }

    .confirm-box h4 { font-size: 1rem; font-weight: 700; margin-bottom: 0.5rem; }
    .confirm-box p { font-size: 0.85rem; color: var(--muted); margin-bottom: 1.25rem; }
    .confirm-btns { display: flex; gap: 0.75rem; }
    .confirm-btns .btn { flex: 1; justify-content: center; }

    /* ── Token setup ── */
    .token-banner {
      background: rgba(212,168,83,0.1);
      border: 1px solid rgba(212,168,83,0.3);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .token-banner p { font-size: 0.85rem; color: var(--gold-light); flex: 1; }

    .token-input-row { display: flex; gap: 0.5rem; flex: 2; min-width: 200px; }

    .token-input {
      flex: 1;
      padding: 0.5rem 0.75rem;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 0.82rem;
      font-family: monospace;
      outline: none;
    }

    .token-input:focus { border-color: var(--gold); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .spinner-inline {
      display: inline-block;
      width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 600px) {
      .product-row { grid-template-columns: 40px 1fr; }
      .product-actions-row { grid-column: 1 / -1; }
      .field-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <img src="images/fav.png" alt="UNLOCK" class="login-logo"/>
    <h1>UNLOCK Admin</h1>
    <p>לוח ניהול מוצרים</p>
    <input type="password" class="login-input" id="passwordInput" placeholder="סיסמה" onkeydown="if(event.key==='Enter') doLogin()"/>
    <button class="login-btn" onclick="doLogin()">כניסה</button>
    <div class="login-error" id="loginError"></div>
  </div>
</div>

<!-- ADMIN -->
<div class="admin-screen" id="adminScreen">
  <div class="topbar">
    <div class="topbar-logo">
      <img src="images/fav.png" alt="UNLOCK"/>
      UNLOCK Admin
    </div>
    <div class="topbar-actions">
      <a href="/" class="btn btn-outline" target="_blank">← האתר</a>
      <button class="btn btn-gold" onclick="openAddModal()">+ מוצר חדש</button>
    </div>
  </div>

  <div class="admin-main">

    <!-- Token banner -->
    <div class="token-banner" id="tokenBanner">
      <p>🔑 הכנס GitHub Token כדי לשמור שינויים</p>
      <div class="token-input-row">
        <input type="password" class="token-input" id="tokenInput" placeholder="ghp_..."/>
        <button class="btn btn-gold" onclick="saveToken()">שמור</button>
      </div>
    </div>

    <div class="section-header">
      <h2>מוצרים <span class="products-count" id="productsCount">0</span></h2>
    </div>

    <div class="products-grid" id="productsGrid">
      <p style="color:var(--muted); text-align:center; padding: 3rem 0;">טוען מוצרים...</p>
    </div>

  </div>
</div>

<!-- EDIT/ADD MODAL -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-header">
      <h3 id="modalTitle">עריכת מוצר</h3>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>

    <div class="field">
      <label>שם מוצר</label>
      <input type="text" id="fTitle" placeholder='MTL™800 מולטילוק'/>
    </div>

    <div class="field">
      <label>תיאור</label>
      <textarea id="fDesc" placeholder="תיאור המוצר..."></textarea>
    </div>

    <div class="field-row">
      <div class="field">
        <label>מחיר מלא (₪)</label>
        <input type="number" id="fPrice" placeholder="770"/>
      </div>
      <div class="field">
        <label>מחיר מבצע (₪) – אופציונלי</label>
        <input type="number" id="fDiscountPrice" placeholder="550"/>
      </div>
    </div>

    <div class="field-row">
      <div class="field">
        <label>מותג</label>
        <input type="text" id="fBrand" placeholder="מולטילוק"/>
      </div>
      <div class="field">
        <label>קטגוריה</label>
        <select id="fCategory">
          <option>צילינדרים</option>
          <option>מנעולים חכמים</option>
          <option>ועד בניין</option>
          <option>שונות</option>
        </select>
      </div>
    </div>

    <div class="field-row">
      <div class="field">
        <label>סטטוס</label>
        <select id="fStatus">
          <option value="">ללא</option>
          <option value="חדש">חדש</option>
          <option value="חם">חם</option>
          <option value="מבצע">מבצע</option>
        </select>
      </div>
      <div class="field">
        <label>מע"מ</label>
        <div class="vat-toggle">
          <button type="button" class="vat-opt" id="vatN" onclick="setVat('n')">לא כולל</button>
          <button type="button" class="vat-opt" id="vatY" onclick="setVat('y')">כולל</button>
        </div>
      </div>
    </div>

    <div class="field">
      <label>הערה (note)</label>
      <input type="text" id="fNote" placeholder="כולל שירות והתקנה"/>
    </div>

    <div class="field">
      <label>תמונה (נתיב)</label>
      <input type="text" id="fImage" placeholder="images/product.jpg"/>
    </div>

    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeModal()">ביטול</button>
      <button class="btn btn-gold" id="saveBtn" onclick="saveProduct()">💾 שמור</button>
    </div>
  </div>
</div>

<!-- CONFIRM DELETE -->
<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <h4>מחיקת מוצר</h4>
    <p id="confirmText">האם אתה בטוח שברצונך למחוק מוצר זה?</p>
    <div class="confirm-btns">
      <button class="btn btn-outline" onclick="closeConfirm()">ביטול</button>
      <button class="btn btn-danger" id="confirmDeleteBtn">מחק</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
  const PASS = 'Gal2010200.';
  const REPO = 'Gal9amar/new-unlock';
  const FILE = 'products.json';

  let products = [];
  let editIndex = -1;
  let currentVat = 'n';

  // ── Auth ──
  function doLogin() {
    const val = document.getElementById('passwordInput').value;
    if (val === PASS) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('adminScreen').classList.add('visible');
      initAdmin();
    } else {
      document.getElementById('loginError').textContent = 'סיסמה שגויה';
    }
  }

  // ── Token ──
  function saveToken() {
    const t = document.getElementById('tokenInput').value.trim();
    if (!t) return;
    localStorage.setItem('gh_token', t);
    document.getElementById('tokenBanner').style.display = 'none';
    showToast('טוקן נשמר ✓', 'success');
  }

  function getToken() {
    return localStorage.getItem('gh_token') || '';
  }

  // ── Init ──
  async function initAdmin() {
    if (getToken()) {
      document.getElementById('tokenBanner').style.display = 'none';
    }
    await loadProducts();
  }

  // ── Load products ──
  async function loadProducts() {
    try {
      const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE}`, {
        headers: { 'Authorization': `token ${getToken()}` }
      });
      const data = await res.json();
      products = JSON.parse(atob(data.content.replace(/\n/g, '')));
      window._fileSha = data.sha;
      renderProducts();
    } catch(e) {
      showToast('שגיאה בטעינת מוצרים', 'error');
    }
  }

  // ── Render ──
  function renderProducts() {
    const grid = document.getElementById('productsGrid');
    document.getElementById('productsCount').textContent = products.length;

    grid.innerHTML = products.map((p, i) => `
      <div class="product-row">
        <img class="product-thumb" src="${p.image || 'images/fav.png'}" onerror="this.src='images/fav.png'" alt="${p.title}"/>
        <div class="product-info">
          <div class="product-name">${p.title}</div>
          <div class="product-meta">${p.brand} · ${p.category} · ${p.including_vat === 'n' ? 'לא כולל מע"מ' : 'כולל מע"מ'}</div>
          <div class="product-price-display">
            ₪${p.discount_price || p.price || '—'}
            ${p.discount_price ? `<span class="old">₪${p.price}</span>` : ''}
          </div>
        </div>
        <div class="product-actions-row">
          <button class="btn btn-outline" onclick="openEditModal(${i})">✏️ עריכה</button>
          <button class="btn btn-danger" onclick="openConfirmDelete(${i})">🗑️</button>
        </div>
      </div>
    `).join('');
  }

  // ── Edit modal ──
  function openEditModal(index) {
    editIndex = index;
    const p = products[index];
    document.getElementById('modalTitle').textContent = 'עריכת מוצר';
    document.getElementById('fTitle').value = p.title || '';
    document.getElementById('fDesc').value = p.desc || '';
    document.getElementById('fPrice').value = p.price || '';
    document.getElementById('fDiscountPrice').value = p.discount_price || '';
    document.getElementById('fBrand').value = p.brand || '';
    document.getElementById('fCategory').value = p.category || 'צילינדרים';
    document.getElementById('fStatus').value = p.status || '';
    document.getElementById('fNote').value = p.note || '';
    document.getElementById('fImage').value = p.image || '';
    setVat(p.including_vat || 'n');
    document.getElementById('editModal').classList.add('visible');
  }

  function openAddModal() {
    editIndex = -1;
    document.getElementById('modalTitle').textContent = 'הוספת מוצר חדש';
    document.getElementById('fTitle').value = '';
    document.getElementById('fDesc').value = '';
    document.getElementById('fPrice').value = '';
    document.getElementById('fDiscountPrice').value = '';
    document.getElementById('fBrand').value = '';
    document.getElementById('fCategory').value = 'צילינדרים';
    document.getElementById('fStatus').value = '';
    document.getElementById('fNote').value = 'כולל שירות והתקנה';
    document.getElementById('fImage').value = '';
    setVat('n');
    document.getElementById('editModal').classList.add('visible');
  }

  function closeModal() {
    document.getElementById('editModal').classList.remove('visible');
  }

  function setVat(val) {
    currentVat = val;
    document.getElementById('vatN').classList.toggle('active', val === 'n');
    document.getElementById('vatY').classList.toggle('active', val === 'y');
  }

  // ── Save ──
  async function saveProduct() {
    const btn = document.getElementById('saveBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-inline"></span> שומר...';

    const updated = {
      title: document.getElementById('fTitle').value.trim(),
      desc: document.getElementById('fDesc').value.trim(),
      image: document.getElementById('fImage').value.trim(),
      price: parseFloat(document.getElementById('fPrice').value) || 0,
      discount_price: parseFloat(document.getElementById('fDiscountPrice').value) || '',
      brand: document.getElementById('fBrand').value.trim(),
      category: document.getElementById('fCategory').value,
      status: document.getElementById('fStatus').value,
      tags: editIndex >= 0 ? (products[editIndex].tags || []) : [],
      phone: '0533888381',
      whatsapp: '972533888381',
      note: document.getElementById('fNote').value.trim(),
      including_vat: currentVat
    };

    if (!updated.discount_price) delete updated.discount_price;

    if (editIndex >= 0) {
      products[editIndex] = { ...products[editIndex], ...updated };
    } else {
      products.push(updated);
    }

    const ok = await pushToGitHub();
    btn.disabled = false;
    btn.innerHTML = '💾 שמור';

    if (ok) {
      closeModal();
      renderProducts();
      showToast(editIndex >= 0 ? 'המוצר עודכן ✓' : 'המוצר נוסף ✓', 'success');
    }
  }

  // ── Delete ──
  let deleteIndex = -1;

  function openConfirmDelete(index) {
    deleteIndex = index;
    document.getElementById('confirmText').textContent = `למחוק את "${products[index].title}"?`;
    document.getElementById('confirmOverlay').classList.add('visible');
    document.getElementById('confirmDeleteBtn').onclick = confirmDelete;
  }

  function closeConfirm() {
    document.getElementById('confirmOverlay').classList.remove('visible');
  }

  async function confirmDelete() {
    closeConfirm();
    products.splice(deleteIndex, 1);
    const ok = await pushToGitHub();
    if (ok) {
      renderProducts();
      showToast('המוצר נמחק', 'success');
    }
  }

  // ── GitHub push ──
  async function pushToGitHub() {
    const token = getToken();
    if (!token) {
      showToast('חסר GitHub Token', 'error');
      return false;
    }

    showToast('שומר לגיטהאב...', 'loading');

    try {
      // Get fresh SHA
      const getRes = await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE}`, {
        headers: { 'Authorization': `token ${token}` }
      });
      const getData = await getRes.json();
      const sha = getData.sha;

      const content = btoa(unescape(encodeURIComponent(JSON.stringify(products, null, 4))));

      const putRes = await fetch(`https://api.github.com/repos/${REPO}/contents/${FILE}`, {
        method: 'PUT',
        headers: {
          'Authorization': `token ${token}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          message: 'Admin: update products',
          content,
          sha
        })
      });

      const putData = await putRes.json();
      if (putData.content) {
        return true;
      } else {
        showToast('שגיאה בשמירה', 'error');
        return false;
      }
    } catch(e) {
      showToast('שגיאת רשת', 'error');
      return false;
    }
  }

  // ── Toast ──
  let toastTimer;
  function showToast(msg, type = 'success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type} show`;
    clearTimeout(toastTimer);
    if (type !== 'loading') {
      toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
    }
  }

  // Close modal on overlay click
  document.getElementById('editModal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });
  document.getElementById('confirmOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeConfirm();
  });
</script>
</body>
</html>
